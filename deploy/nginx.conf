# Nginx configuration for 闲鱼集市 Django App
# Place this file in /etc/nginx/sites-available/class
# Then: ln -s /etc/nginx/sites-available/class /etc/nginx/sites-enabled/
# Then: systemctl reload nginx

upstream django_class {
    server 127.0.0.1:8000;
}

server {
    listen 80;
    server_name _;
    charset utf-8;

    # Static files
    location /static/ {
        alias /usr/share/nginx/html/class/staticfiles/;
    }

    # Media files
    location /media/ {
        alias /usr/share/nginx/html/class/media/;
    }

    # Django application
    location / {
        proxy_pass http://django_class;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
    }
}
