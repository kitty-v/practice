{% extends 'base.html' %}

{% block title %}下架商品 - {{ SITE_NAME }}{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow-sm border-danger">
            <div class="card-body text-center p-5">
                <i class="bi bi-exclamation-triangle text-danger fs-1"></i>
                <h4 class="mt-3">确认下架商品</h4>
                <p>确定要将「{{ item.title }}」下架吗？</p>
                <p class="text-muted">下架后其他用户将无法看到此商品</p>
                <form method="post">
                    {% csrf_token %}
                    <div class="d-flex justify-content-center gap-2">
                        <button type="submit" class="btn btn-danger"><i class="bi bi-trash"></i> 确认下架</button>
                        <a href="{% url 'items:item_detail' item.pk %}" class="btn btn-outline-secondary">取消</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
