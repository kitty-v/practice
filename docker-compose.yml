services:
  db:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: class_project
      MYSQL_USER: class_project
      MYSQL_PASSWORD: class_project
      MYSQL_ROOT_PASSWORD: root_password
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "3307:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot_password"]
      interval: 5s
      timeout: 5s
      retries: 10

  web:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_NAME: class_project
      DB_USER: class_project
      DB_PASSWORD: class_project
      DB_HOST: db
      DB_PORT: "3306"
    volumes:
      - media_data:/app/media
      - static_data:/app/staticfiles
    ports:
      - "8800:8000"

volumes:
  mysql_data:
  media_data:
  static_data:
